; ============================================================
;  SHADOW GAMES - platformio.ini
;  Target: M5Stack Cardputer-Adv (ESP32-S3 / Stamp-S3A)
;  Radio cap: Cap LoRa868 or Cap LoRa-1262 (SX1262 + ATGM336H GNSS)
;
;  These board/platform/upload values are copied from M5Stack's own
;  official docs (docs.m5stack.com -> Cardputer-Adv), NOT guessed.
;  If M5Stack updates their recommended platform version, prefer theirs.
; ============================================================

[env:cardputer-adv]
platform = espressif32@6.7.0
board = esp32-s3-devkitc-1
framework = arduino

; Confirmed working upload speed for Cardputer-Adv per M5Stack docs.
; If you get sync errors, drop to 921600 or 115200 (see README).
upload_speed = 1500000
monitor_speed = 115200

build_flags =
    -DESP32S3
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

lib_deps =
    m5stack/M5Unified @ ^0.2.2
    https://github.com/m5stack/M5Cardputer
    jgromes/RadioLib @ ^6.6.0
    mikalhart/TinyGPSPlus @ ^1.0.3
    arozcan/MFRC522-I2C-Library @ ^1.0.0   ; used by M5Stack's own Unit RFID2 tutorial

monitor_filters = esp32_exception_decoder
